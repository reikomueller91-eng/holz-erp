<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolzERP - Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .phase { margin: 10px 0; }
        .complete { color: #4ade80; }
        .planned { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪵 HolzERP</h1>
        <p>Custom Sawn Wood Production Management System</p>
        
        <div class="status">
            <h2>Entwicklungsstand</h2>
            <div class="phase complete">✅ Phase 1: Architektur + Docker</div>
            <div class="phase complete">✅ Phase 2: Auth + Crypto + CRUD</div>
            <div class="phase complete">✅ Phase 3: Pricing + Offers + Orders</div>
            <div class="phase complete">✅ Phase 4: Invoice + PDF</div>
            <div class="phase planned">⏳ Phase 5: Production UI</div>
            <div class="phase planned">⏳ Phase 6: React Frontend</div>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem;">
            Backend API läuft unter <strong>/api</strong>
        </p>
    </div>
</body>
</html>
