version: "3.9"

# HolzERP – Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"       # API
      - "9229:9229"       # Node inspector (debugger)
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_PATH: /data/holz-dev.db
      FILE_STORE_PATH: /data/files
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/src:ro    # Hot reload source
      - holz_dev_data:/data
    command: ["npm", "run", "dev"]

  # Optional: adminer for raw DB inspection during dev
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: backend

volumes:
  holz_dev_data:
    driver: local
